<h2>Task Tracker</h2>

<div>
  <input [(ngModel)]="newTask" placeholder="Enter a task">
  <button (click)="addTask()">Add</button>
</div>

<ul>
  <li *ngFor="let task of taskService.tasks$ | async; let i = index">

    <span [appHighlightTask]="task.completed">
      {{ task.name | formatTask }}
    </span>

    <button (click)="taskService.completeTask(i)">
      Complete
    </button>

  </li>
</ul>
